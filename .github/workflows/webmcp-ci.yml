name: WebMCP Release Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run WebMCP E2E smoke test"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webmcp-release-gate:
    name: "WebMCP Gate (build + unit tests)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm --filter @optimandoai/extension-chromium run build

      - name: Run WebMCP unit + sender-gate tests
        run: pnpm run test:webmcp:ci

  quarantine-monitor:
    name: "Quarantine (pre-existing failures, non-blocking)"
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quarantined tests (informational)
        run: pnpm run test:quarantine || true

  webmcp-e2e-smoke:
    name: "WebMCP E2E Smoke (opt-in)"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_e2e == true }}
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: code/apps/extension-chromium

      - name: Build extension
        run: pnpm --filter @optimandoai/extension-chromium run build

      - name: Run WebMCP E2E smoke
        run: pnpm run test:e2e:webmcp
        working-directory: code/apps/extension-chromium
