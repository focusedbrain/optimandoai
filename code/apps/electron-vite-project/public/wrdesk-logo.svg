<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" fill="none">
  <!-- Official WR Desk mark: shield + gold chevron + WR / DESK + briefcase (line art) -->
  <path
    d="M60 8 L108 26 L108 82 Q108 120 60 142 Q12 120 12 82 L12 26 Z"
    fill="#fff"
    stroke="#1a1a1a"
    stroke-width="5"
  />
  <path
    d="M60 18 L98 33 L98 78 Q98 110 60 128 Q22 110 22 78 L22 33 Z"
    fill="none"
    stroke="#1a1a1a"
    stroke-width="2.5"
  />
  <!-- Accent chevron at inner shield peak (brand gold) -->
  <path d="M54 27 L60 18 L66 27 Z" fill="#c9a227" stroke="none" />
  <text
    x="60"
    y="68"
    text-anchor="middle"
    font-family="Arial Black, Impact, 'Helvetica Neue', sans-serif"
    font-size="32"
    font-weight="900"
    fill="#1a1a1a"
  >WR</text>
  <text
    x="60"
    y="94"
    text-anchor="middle"
    font-family="Arial Black, Impact, 'Helvetica Neue', sans-serif"
    font-size="22"
    font-weight="900"
    fill="#1a1a1a"
  >DESK</text>
  <!-- Briefcase (outline only — matches official logo) -->
  <g
    stroke="#1a1a1a"
    stroke-width="2.2"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M47 109 Q47 99 60 99 Q73 99 73 109" />
    <rect x="43" y="109" width="34" height="23" rx="2.5" />
    <path d="M43 109 L60 101 L77 109" />
    <rect x="55" y="118" width="10" height="8" rx="1" />
    <circle cx="60" cy="121" r="1.6" fill="#1a1a1a" stroke="none" />
  </g>
</svg>
