<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>S4: Checkout Address Form</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; }
    form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .full-width { grid-column: 1 / -1; }
    input, select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; }
    button { grid-column: 1 / -1; padding: 10px; background: #f59e0b; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Shipping Address</h2>
  <form action="/checkout/address" method="POST" id="checkout-form" class="checkout-form">
    <div>
      <label for="first_name">First Name</label>
      <input id="first_name" name="first_name" autocomplete="given-name">
    </div>
    <div>
      <label for="last_name">Last Name</label>
      <input id="last_name" name="last_name" autocomplete="family-name">
    </div>
    <div class="full-width">
      <label for="street">Street Address</label>
      <input id="street" name="street" autocomplete="address-line1">
    </div>
    <div>
      <label for="city">City</label>
      <input id="city" name="city" autocomplete="address-level2">
    </div>
    <div>
      <label for="zip">ZIP / Postal Code</label>
      <input id="zip" name="zip" autocomplete="postal-code" inputmode="numeric">
    </div>
    <div>
      <label for="country">Country</label>
      <select id="country" name="country" autocomplete="country">
        <option value="DE">Germany</option>
        <option value="US">United States</option>
        <option value="GB">United Kingdom</option>
      </select>
    </div>
    <div>
      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone" autocomplete="tel">
    </div>
    <button type="submit">Continue to Payment</button>
  </form>
</body>
</html>
