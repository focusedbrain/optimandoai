<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>S5: Firmendaten (VAT / Company)</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; }
    form { display: flex; flex-direction: column; gap: 12px; }
    input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px; background: #6366f1; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Firmendaten</h2>
  <form id="company-details" method="POST" action="/settings/company">
    <label for="company">Firmenname</label>
    <input id="company" name="company_name" placeholder="Mustermann GmbH">

    <label for="vat">USt-IdNr.</label>
    <input id="vat" name="vat_number" placeholder="DE123456789">

    <label for="hrb">HRB-Nummer</label>
    <input id="hrb" name="hrb_number" placeholder="HRB 12345">

    <label for="tax">Steuernummer</label>
    <input id="tax" name="tax_id" placeholder="123/456/78901">

    <label for="iban">IBAN</label>
    <input id="iban" name="iban" autocomplete="off" placeholder="DE89 3704 0044 0532 0130 00">

    <label for="billing_email">Rechnungs-E-Mail</label>
    <input type="email" id="billing_email" name="billing_email" placeholder="rechnung@firma.de">

    <button type="submit">Speichern</button>
  </form>
</body>
</html>
