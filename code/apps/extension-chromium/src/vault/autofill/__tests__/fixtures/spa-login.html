<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>S6: SPA Login (Dynamic Form)</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; }
    #app { min-height: 200px; }
    form { display: flex; flex-direction: column; gap: 12px; }
    input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="app">
    <p>Loading...</p>
  </div>

  <script>
    // Simulates a React/SPA app that mounts a login form after initial load
    window.mountLoginForm = function() {
      document.getElementById('app').innerHTML = `
        <h2>Log In</h2>
        <form id="spa-login-form">
          <label for="spa-email">Email</label>
          <input type="email" id="spa-email" name="email" autocomplete="email">
          <label for="spa-password">Password</label>
          <input type="password" id="spa-password" name="password" autocomplete="current-password">
          <button type="submit">Log In</button>
        </form>
      `;
    };

    // Simulates SPA navigation after login
    window.navigateToDashboard = function() {
      history.pushState({}, '', '/dashboard');
      document.getElementById('app').innerHTML = `
        <h2>Dashboard</h2>
        <p>Welcome back!</p>
      `;
    };

    // Simulates fetch-based login
    window.simulateFetchLogin = function() {
      return fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: 'test@example.com', password: 'secret' })
      }).catch(() => {
        // Expected to fail in test — the watcher intercepts the call
      });
    };

    // Auto-mount after 500ms (simulates SPA hydration)
    setTimeout(() => window.mountLoginForm(), 500);
  </script>
</body>
</html>
