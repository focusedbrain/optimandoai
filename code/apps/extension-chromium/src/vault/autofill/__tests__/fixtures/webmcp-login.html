<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebMCP E2E: Login Fixture</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; }
    form { display: flex; flex-direction: column; gap: 12px; }
    label { font-size: 14px; font-weight: 500; }
    input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button { padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>WebMCP Login Test</h2>
  <form action="/login" method="POST" id="login-form">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter username">

    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter password">

    <button type="submit">Log In</button>
  </form>
</body>
</html>
