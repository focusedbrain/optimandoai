<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>S2: Email Login</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; }
    form { display: flex; flex-direction: column; gap: 12px; }
    input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Sign In</h2>
  <form action="/auth/signin" method="POST" id="email-login-form">
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" autocomplete="email" placeholder="you@example.com">

    <label for="pass">Password</label>
    <input type="password" id="pass" name="pass" autocomplete="current-password">

    <button type="submit">Sign In</button>
  </form>
</body>
</html>
