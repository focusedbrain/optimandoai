<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>S3: Signup with New Password</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; }
    form { display: flex; flex-direction: column; gap: 12px; }
    input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px; background: #22c55e; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Create Account</h2>
  <form action="/register" method="POST" id="signup-form">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="email">

    <label for="new_password">Password</label>
    <input type="password" id="new_password" name="new_password" autocomplete="new-password">

    <label for="confirm_password">Confirm Password</label>
    <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password">

    <button type="submit">Create Account</button>
  </form>
</body>
</html>
