<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="WR Desk">
  <title>WR Desk</title>
  <rect width="256" height="256" fill="#ffffff"/>
